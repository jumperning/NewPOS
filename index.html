<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnceyDoce — Reporte Inteligente</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: { "primary": "#ab2d00", "surface": "#f6f6f6" },
          fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
        },
      },
    }
  </script>

  <style>
    .material-symbols-outlined { vertical-align: middle; }
    .primary-gradient { background: linear-gradient(135deg, #ab2d00 0%, #ff7851 100%); }
    .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
    .nav-active { background: #ab2d00; color: white; font-weight: bold; }
    input[type="date"] { border: none; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.75rem; color: #1e293b; }
    input[type="date"]:focus { ring: 0; outline: none; }
  </style>
</head>

<body class="bg-surface text-slate-800 font-body antialiased">

  <aside class="w-full lg:w-64 lg:h-screen lg:fixed left-0 top-0 bg-[#0c0f0f] flex lg:flex-col p-4 lg:p-6 justify-between lg:justify-start z-50">
    <div class="flex items-center gap-3 lg:mb-10">
      <div class="w-8 h-8 lg:w-10 lg:h-10 primary-gradient rounded-lg flex items-center justify-center">
        <span class="material-symbols-outlined text-white text-sm lg:text-base">analytics</span>
      </div>
      <h1 class="text-lg lg:text-xl font-black text-white tracking-tight uppercase font-headline">Onceydoce</h1>
    </div>
    <nav class="hidden lg:block space-y-2">
      <div class="flex items-center gap-3 px-4 py-3 nav-active rounded-lg text-sm">
        <span class="material-symbols-outlined">dashboard</span>
        <span>Ventas</span>
      </div>
       <div class="flex items-center gap-3 px-4 py-3 nav-active rounded-lg text-sm">
        <span class="material-symbols-outlined">dashboard</span>
        <span>Reporte de Ventas</span>
      </div>
    </nav>
  </aside>

  <main class="lg:ml-64 min-h-screen">
    <div class="p-4 md:p-8 max-w-7xl mx-auto space-y-8">
      
      <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
          <h2 class="text-3xl font-extrabold font-headline tracking-tight text-slate-900">Análisis por Categoría</h2>
          <p class="text-slate-500 text-sm italic" id="statusBadge">Sincronizando menú y ventas...</p>
        </div>
        <div class="flex items-center bg-white px-4 py-2 rounded-2xl card-shadow border border-slate-100">
             <input id="fechaDesde" type="date" />
             <span class="text-slate-300 mx-2">/</span>
             <input id="fechaHasta" type="date" />
        </div>
      </header>

      <div id="gridCategorias" class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-white rounded-2xl p-6 card-shadow border-b-4 border-blue-500">
              <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Bebidas</p>
              <p id="totalBebida" class="text-2xl font-black font-headline text-slate-900">$0</p>
          </div>
          <div class="bg-white rounded-2xl p-6 card-shadow border-b-4 border-orange-500">
              <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Cafetería</p>
              <p id="totalCafe" class="text-2xl font-black font-headline text-slate-900">$0</p>
          </div>
          <div class="bg-white rounded-2xl p-6 card-shadow border-b-4 border-green-500">
              <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Comida</p>
              <p id="totalComida" class="text-2xl font-black font-headline text-slate-900">$0</p>
          </div>
      </div>

      <div class="bg-white rounded-3xl card-shadow overflow-hidden border border-slate-100">
        <div class="px-8 py-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
            <h3 class="font-headline font-bold text-slate-900 uppercase text-xs tracking-widest">Desglose de Productos</h3>
            <button id="btnReload" class="p-2 hover:bg-slate-200 rounded-full transition-colors">
                <span class="material-symbols-outlined text-slate-400">refresh</span>
            </button>
        </div>
        <div class="table-container">
          <table class="w-full text-left">
            <thead class="bg-slate-50/80">
              <tr>
                <th class="px-8 py-4 text-[10px] font-bold uppercase text-slate-400">Producto</th>
                <th class="px-8 py-4 text-[10px] font-bold uppercase text-slate-400">Categoría Excel</th>
                <th class="px-8 py-4 text-[10px] font-bold uppercase text-slate-400 text-center">Unidades</th>
                <th class="px-8 py-4 text-[10px] font-bold uppercase text-slate-400 text-right">Recaudación</th>
              </tr>
            </thead>
            <tbody id="tbodyRanking" class="divide-y divide-slate-50"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>
    const URL_VENTAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNZmwzwN0zHiYYSEpk0N11IIRouQUu85lzE6eYe4DoR1WbtnV239mtGRXPfBdbbVbSI9Scx3LVcww-/pub?gid=2113257466&single=true&output=csv";
    const URL_MENU = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNZmwzwN0zHiYYSEpk0N11IIRouQUu85lzE6eYe4DoR1WbtnV239mtGRXPfBdbbVbSI9Scx3LVcww-/pub?gid=974390874&single=true&output=csv";

    const $fmt = (n) => new Intl.NumberFormat('es-AR', { style:'currency', currency:'ARS', maximumFractionDigits:0 }).format(Number(n||0));
    
    let DICCIONARIO_MENU = {}; 
    let VENTAS_RAW = [];

    // 1. CARGAR EL MENÚ PRIMERO
    async function cargarMenu() {
        return new Promise((resolve) => {
            Papa.parse(URL_MENU, {
                download: true, header: true, skipEmptyLines: true,
                complete: (res) => {
                    res.data.forEach(item => {
                        const nombre = (item.producto || item.nombre || "").trim().toLowerCase();
                        const cat = (item.categoria || item.Categoría || "Otros").trim();
                        if(nombre) DICCIONARIO_MENU[nombre] = cat;
                    });
                    resolve();
                }
            });
        });
    }

    // 2. CARGAR LAS VENTAS
    async function cargarVentas() {
        return new Promise((resolve) => {
            Papa.parse(URL_VENTAS, {
                download: true, header: true, skipEmptyLines: true,
                complete: (res) => {
                    VENTAS_RAW = res.data.map(r => ({
                        date: new Date(r.timestamp || r.fecha || r.Timestamp),
                        items: JSON.parse(r['items(json)'] || r.items || '[]')
                    })).filter(v => !isNaN(v.date));
                    resolve();
                }
            });
        });
    }

    function obtenerCategoriaReal(nombreProducto) {
        const n = nombreProducto.trim().toLowerCase();
        // Busca en el diccionario cargado de la pestaña Menu
        return DICCIONARIO_MENU[n] || "Otros";
    }

    function procesarYRenderizar() {
        const dStr = $('#fechaDesde').val();
        const hStr = $('#fechaHasta').val();
        if(!dStr || !hStr) return;

        const dLimit = new Date(dStr + "T00:00:00");
        const hLimit = new Date(hStr + "T23:59:59");

        let prodMap = {};
        let totalesPorAgrupador = { 'Bebida': 0, 'Cafetería': 0, 'Comida': 0, 'Otros': 0 };

        VENTAS_RAW.filter(v => v.date >= dLimit && v.date <= hLimit).forEach(v => {
            v.items.forEach(it => {
                const catExcel = obtenerCategoriaReal(it.nombre);
                const subtotal = Number(it.total || (it.precio * it.qty));
                
                // Clasificación para las tarjetas de arriba (agrupación lógica)
                const c = catExcel.toLowerCase();
                if(c.includes('bebida') || c.includes('cerveza') || c.includes('gaseosa') || c.includes('vino')) totalesPorAgrupador['Bebida'] += subtotal;
                else if(c.includes('cafe') || c.includes('pasteleria') || c.includes('dulce')) totalesPorAgrupador['Cafetería'] += subtotal;
                else if(c.includes('comida') || c.includes('sandwich') || c.includes('burguer') || c.includes('pizza')) totalesPorAgrupador['Comida'] += subtotal;
                else totalesPorAgrupador['Otros'] += subtotal;

                if(!prodMap[it.nombre]) prodMap[it.nombre] = { nombre: it.nombre, cat: catExcel, qty: 0, total: 0 };
                prodMap[it.nombre].qty += Number(it.qty);
                prodMap[it.nombre].total += subtotal;
            });
        });

        // Actualizar Tarjetas
        $('#totalBebida').text($fmt(totalesPorAgrupador['Bebida']));
        $('#totalCafe').text($fmt(totalesPorAgrupador['Cafetería']));
        $('#totalComida').text($fmt(totalesPorAgrupador['Comida']));

        // Actualizar Tabla
        const $tb = $('#tbodyRanking').empty();
        Object.values(prodMap).sort((a,b) => b.total - a.total).forEach(p => {
            $tb.append(`
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-5 text-sm font-bold text-slate-900">${p.nombre}</td>
                    <td class="px-8 py-5 text-[10px] font-black uppercase text-slate-400">${p.cat}</td>
                    <td class="px-8 py-5 text-center text-sm font-medium text-slate-600">${p.qty}</td>
                    <td class="px-8 py-5 text-right font-black text-slate-900">${$fmt(p.total)}</td>
                </tr>
            `);
        });
    }

    async function init() {
        await cargarMenu();
        await cargarVentas();
        const hoy = new Date().toISOString().slice(0,10);
        $('#fechaDesde').val(hoy);
        $('#fechaHasta').val(hoy).trigger('change');
        $('#statusBadge').text('Sincronización completa');
    }

    $('#fechaDesde, #fechaHasta').on('change', procesarYRenderizar);
    $('#btnReload').on('click', init);
    $(document).ready(init);
  </script>
</body>
</html>
