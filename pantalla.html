<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OnceyDoce - Tap List Proyector</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "primary": "#ffd79b",
                "surface": "#131313",
                "on-surface": "#e5e2e1",
                "surface-container-low": "#1c1b1b",
                "outline-variant": "#514532"
              },
              "fontFamily": {
                "headline": ["Space Grotesk"],
                "body": ["Manrope"]
              }
            },
          },
        }
    </script>
    <style>
        body { background-color: #131313; color: #e5e2e1; overflow: hidden; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Animación suave para cuando cambian los datos */
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen w-full">

<header class="w-full pt-10 pb-6 flex justify-center items-center max-w-screen-2xl mx-auto px-12 bg-[#131313]">
    <div class="flex flex-col items-center">
        <h1 class="text-4xl font-bold tracking-tighter text-[#ffd79b] uppercase font-headline">
            ONCEYDOCE • PIZARRA DIGITAL
        </h1>
        <div class="mt-2 h-[1px] w-32 bg-gradient-to-r from-transparent via-[#ffd79b] to-transparent opacity-40"></div>
    </div>
</header>

<main class="flex-grow p-12 pt-4">
    <div id="tapGrid" class="grid grid-cols-3 gap-8 h-full max-w-[1920px] mx-auto">
        </div>
</main>

<footer class="w-full pb-8 pt-4 px-12 flex justify-between items-center opacity-60">
    <div class="flex gap-4 items-center">
        <div class="w-3 h-3 rounded-full bg-primary animate-pulse"></div>
        <span id="syncTime" class="text-xs uppercase tracking-[0.2em] font-headline font-medium text-primary">Cargando Taps...</span>
    </div>
    <span class="text-xs uppercase tracking-[0.2em] font-headline font-medium">Bebe con moderación • OnceyDoce Bar</span>
</footer>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNZmwzwN0zHiYYSEpk0N11IIRouQUu85lzE6eYe4DoR1WbtnV239mtGRXPfBdbbVbSI9Scx3LVcww-/pub?gid=510719426&single=true&output=csv";

    function updateDashboard() {
        Papa.parse(SHEET_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                renderTaps(results.data);
                const now = new Date();
                $('#syncTime').text('Actualizado: ' + now.getHours() + ':' + now.getMinutes().toString().padStart(2, '0'));
            }
        });
    }

    function renderTaps(data) {
        const $grid = $('#tapGrid').empty();
        // Filtramos solo las canillas
        const taps = data.filter(row => row.Type?.toLowerCase().trim() === 'canilla');

        taps.forEach((tap, index) => {
            const product = tap.Product || 'Cerveza';
            const brewery = tap.Brewery || 'OnceyDoce';
            const abv = tap.ABV || '--';
            const ibu = tap.IBU || '--';
            const srm = tap.SRM || '--';
            const description = tap.Description || 'Sin descripción disponible.';
            
            // Lógica de iconos según el estilo (opcional)
            let icon = "sports_bar"; 
            if(product.toLowerCase().includes('ipa')) icon = "filter_vintage";
            if(product.toLowerCase().includes('stout')) icon = "coffee";

            const tapHtml = `
                <article class="fade-in relative flex flex-col bg-surface-container-low rounded-xl overflow-hidden shadow-2xl border border-outline-variant/10">
                    <div class="p-8 flex flex-col justify-between h-full">
                        <div class="relative">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-primary text-[#432c00] px-3 py-1 font-headline font-bold rounded-lg text-xl">
                                    ${(index + 1).toString().padStart(2, '0')}
                                </span>
                                <span class="material-symbols-outlined text-primary text-3xl">${icon}</span>
                            </div>
                            <h2 class="text-4xl font-headline font-bold text-primary tracking-tight leading-none mb-1 uppercase italic">
                                ${product}
                            </h2>
                            <p class="text-lg font-body text-on-surface/60 mb-4 font-bold tracking-widest uppercase">
                                ${brewery}
                            </p>
                            <p class="text-base text-on-surface opacity-80 leading-relaxed font-light line-clamp-3 italic">
                                "${description}"
                            </p>
                        </div>

                        <div class="mt-6 space-y-6">
                            <div class="flex justify-between items-center bg-[#2a2a2a] rounded-lg p-4">
                                <div class="flex flex-col items-center flex-1 border-r border-outline-variant/30">
                                    <span class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">ABV</span>
                                    <span class="text-2xl font-headline font-semibold text-white">${abv}%</span>
                                </div>
                                <div class="flex flex-col items-center flex-1 border-r border-outline-variant/30">
                                    <span class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">IBU</span>
                                    <span class="text-2xl font-headline font-semibold text-white">${ibu}</span>
                                </div>
                                <div class="flex flex-col items-center flex-1">
                                    <span class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">SRM</span>
                                    <span class="text-2xl font-headline font-semibold text-white">${srm}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            `;
            $grid.append(tapHtml);
        });
    }

    $(document).ready(function() {
        updateDashboard();
        // Actualiza la pizarra cada 2 minutos por si cambias un barril
        setInterval(updateDashboard, 120000);
    });
</script>
</body>
</html>
