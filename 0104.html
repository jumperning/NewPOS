<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnceyDoce — Reporte Avanzado</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&display=swap" rel="stylesheet" />

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: { "primary": "#ab2d00", "surface": "#f6f6f6" },
          fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
        },
      },
    }
  </script>

  <style>
    .material-symbols-outlined { vertical-align: middle; }
    .primary-gradient { background: linear-gradient(135deg, #ab2d00 0%, #ff7851 100%); }
    .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
    .nav-active { background: #ab2d00; color: white; font-weight: bold; }
    .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    input { border-radius: 0.75rem !important; border-color: #e2e8f0 !important; }
  </style>
</head>

<body class="bg-surface text-slate-800 font-body antialiased">

  <aside class="w-full lg:w-64 lg:h-screen lg:fixed left-0 top-0 bg-[#0c0f0f] flex lg:flex-col p-4 lg:p-6 justify-between lg:justify-start z-50">
    <div class="flex items-center gap-3 lg:mb-10">
      <div class="w-8 h-8 lg:w-10 lg:h-10 primary-gradient rounded-lg flex items-center justify-center">
        <span class="material-symbols-outlined text-white text-sm lg:text-base">analytics</span>
      </div>
      <h1 class="text-lg lg:text-xl font-black text-white tracking-tight uppercase font-headline">Onceydoce</h1>
    </div>
    <nav class="hidden lg:block space-y-2">
      <div class="flex items-center gap-3 px-4 py-3 nav-active rounded-lg text-sm">
        <span class="material-symbols-outlined">monitoring</span>
        <span>Reportes</span>
      </div>
    </nav>
  </aside>

  <main class="lg:ml-64 min-h-screen">
    <div class="p-4 md:p-8 max-w-7xl mx-auto space-y-6 lg:space-y-8">
      
      <header>
        <h2 class="text-2xl md:text-4xl font-extrabold font-headline tracking-tight text-slate-900">Análisis de Ventas</h2>
        <p class="text-slate-500 text-sm italic" id="statusBadge">Cargando...</p>
      </header>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
        <div class="bg-white rounded-2xl p-6 card-shadow border-t-4 border-primary">
          <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Ingresos Periodo</p>
          <p id="kpiIngDia" class="text-2xl font-black font-headline">$0</p>
        </div>
        <div class="bg-white rounded-2xl p-6 card-shadow">
          <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Ventas</p>
          <p id="kpiVentasCant" class="text-2xl font-black font-headline">0</p>
        </div>
        <div class="bg-white rounded-2xl p-6 card-shadow">
          <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Costo Total</p>
          <p id="kpiCostoDia" class="text-2xl font-black font-headline text-red-500">$0</p>
        </div>
        <div class="bg-white rounded-2xl p-6 card-shadow">
          <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Ganancia Bruta</p>
          <p id="kpiGanDia" class="text-2xl font-black font-headline text-green-600">$0</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-3 space-y-6">
          <div class="bg-white rounded-2xl p-6 card-shadow space-y-5">
            <h3 class="text-sm font-black uppercase tracking-widest text-slate-900 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">date_range</span> Filtro
            </h3>
            <div class="space-y-3">
              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Desde</label>
                <input id="fechaDesde" type="date" class="w-full border-slate-200 text-sm font-semibold" />
              </div>
              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Hasta</label>
                <input id="fechaHasta" type="date" class="w-full border-slate-200 text-sm font-semibold" />
              </div>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-2">
              <button id="btnHoy" class="py-2 bg-slate-50 border border-slate-200 rounded-lg text-[10px] font-bold uppercase hover:bg-slate-100">Hoy</button>
              <button id="btn7d" class="py-2 bg-slate-50 border border-slate-200 rounded-lg text-[10px] font-bold uppercase hover:bg-slate-100">7 Días</button>
            </div>
            <hr class="border-slate-50">
            <input id="csvUrl" type="hidden" value="https://docs.google.com/spreadsheets/d/e/2PACX-1vTNZmwzwN0zHiYYSEpk0N11IIRouQUu85lzE6eYe4DoR1WbtnV239mtGRXPfBdbbVbSI9Scx3LVcww-/pub?gid=474194648&single=true&output=csv" />
            <button id="btnReload" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-black">Sincronizar Datos</button>
          </div>
        </aside>

        <div class="lg:col-span-9">
          <div class="bg-white rounded-2xl card-shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                <h3 class="font-headline font-bold text-slate-900 uppercase text-xs tracking-widest">Movimientos</h3>
                <span id="cierreRangoLbl" class="text-[10px] font-bold text-primary bg-primary/5 px-3 py-1 rounded-full uppercase">Seleccione fechas</span>
            </div>
            <div class="table-container">
              <table class="w-full text-left">
                <thead class="bg-slate-50/80">
                  <tr>
                    <th class="px-6 py-4 text-[10px] font-bold uppercase text-slate-500">Fecha</th>
                    <th class="px-6 py-4 text-[10px] font-bold uppercase text-slate-500">Cliente</th>
                    <th class="px-6 py-4 text-[10px] font-bold uppercase text-slate-500 text-right">Total</th>
                    <th class="px-6 py-4 text-[10px] font-bold uppercase text-slate-500 text-right">Margen</th>
                  </tr>
                </thead>
                <tbody id="tbodyVentas" class="divide-y divide-slate-50"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const $fmt = (n) => new Intl.NumberFormat('es-AR', { style:'currency', currency:'ARS', maximumFractionDigits:0 }).format(Number(n||0));
    let ROWS = [];

    // CORRECCIÓN CLAVE: Función para procesar fechas ISO y formatos mixtos
    const parseFecha = (s) => {
        if (!s) return null;
        try {
            // Si viene como 2026-04-01T16:50:05.029Z, New Date() lo entiende nativamente
            const d = new Date(s);
            if (!isNaN(d.getTime())) return d;

            // Si falla, intentamos limpieza manual para formatos latinos (DD/MM/YYYY)
            const parts = String(s).split(/[\sT/:-]/);
            if (parts.length >= 3) {
                // Asumimos que si empieza con 4 dígitos es YYYY-MM-DD
                if (parts[0].length === 4) {
                    return new Date(parts[0], parts[1]-1, parts[2], parts[3]||0, parts[4]||0);
                } else {
                    // Si no, es DD-MM-YYYY
                    return new Date(parts[2], parts[1]-1, parts[0], parts[3]||0, parts[4]||0);
                }
            }
            return null;
        } catch(e) { return null; }
    };

    async function loadCSV(){
      const url = $('#csvUrl').val().trim();
      $('#statusBadge').text('Actualizando...');
      
      Papa.parse(url, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: (res) => {
          ROWS = res.data.map(r => {
            const fechaRaw = r.timestamp || r.fecha || r.Timestamp || '';
            const d = parseFecha(fechaRaw);
            const total = Number(r.total || 0);
            const costo = Number(r.totalCosto || 0);
            return {
              date: d,
              cliente: r.cliente || 'Consumidor Final',
              mesa: r.mesa || '-',
              total: total,
              costo: costo,
              ganancia: total - costo
            };
          }).filter(r => r.date !== null);

          $('#statusBadge').text(`Datos listos: ${ROWS.length} registros`);
          
          // Setear fechas por defecto (Hoy) si están vacías
          if (!$('#fechaDesde').val()) {
              const hoy = new Date().toISOString().slice(0, 10);
              $('#fechaDesde').val(hoy);
              $('#fechaHasta').val(hoy);
          }
          filtrarYRederizar();
        }
      });
    }

    function filtrarYRederizar() {
      const desdeStr = $('#fechaDesde').val();
      const hastaStr = $('#fechaHasta').val();
      
      if (!desdeStr || !hastaStr) return;

      // Creamos objetos de fecha para comparar. 
      // Importante: Usamos la hora 00:00:00 para el inicio y 23:59:59 para el final del rango
      const dLimit = new Date(desdeStr + "T00:00:00");
      const hLimit = new Date(hastaStr + "T23:59:59");

      const filtrados = ROWS.filter(r => {
          const time = r.date.getTime();
          return time >= dLimit.getTime() && time <= hLimit.getTime();
      });
      
      const tIng = filtrados.reduce((a,r) => a + r.total, 0);
      const tCos = filtrados.reduce((a,r) => a + r.costo, 0);
      const tGan = tIng - tCos;

      $('#kpiIngDia').text($fmt(tIng));
      $('#kpiGanDia').text($fmt(tGan));
      $('#kpiVentasCant').text(filtrados.length);
      $('#kpiCostoDia').text($fmt(tCos));
      $('#cierreRangoLbl').text(`${desdeStr} al ${hastaStr}`);

      const $tb = $('#tbodyVentas');
      $tb.empty();
      
      // Ordenar por fecha descendente
      filtrados.sort((a,b) => b.date - a.date).forEach(r => {
        $tb.append(`
          <tr class="hover:bg-orange-50/40 transition-colors">
            <td class="px-6 py-4 text-xs font-medium text-slate-500">
                ${r.date.toLocaleDateString('es-AR')} <br> 
                <span class="text-[10px] text-slate-400">${r.date.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'})}</span>
            </td>
            <td class="px-6 py-4">
              <div class="text-sm font-bold text-slate-800">${r.cliente}</div>
              <div class="text-[10px] text-slate-400 uppercase font-black">Mesa: ${r.mesa}</div>
            </td>
            <td class="px-6 py-4 text-right font-black text-slate-900 text-sm">${$fmt(r.total)}</td>
            <td class="px-6 py-4 text-right text-xs font-bold ${r.ganancia >= 0 ? 'text-green-600' : 'text-red-500'}">${$fmt(r.ganancia)}</td>
          </tr>
        `);
      });
    }

    $('#btnHoy').on('click', () => {
      const s = new Date().toISOString().slice(0,10);
      $('#fechaDesde').val(s);
      $('#fechaHasta').val(s).trigger('change');
    });

    $('#btn7d').on('click', () => {
      const h = new Date();
      const d = new Date(); d.setDate(h.getDate()-7);
      $('#fechaDesde').val(d.toISOString().slice(0,10));
      $('#fechaHasta').val(h.toISOString().slice(0,10)).trigger('change');
    });

    $('#fechaDesde, #fechaHasta').on('change', filtrarYRederizar);
    $('#btnReload').on('click', loadCSV);

    $(document).ready(loadCSV);
  </script>
</body>
</html>
