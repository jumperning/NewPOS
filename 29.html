<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OnceyDoce - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            theme: {
              extend: {
                colors: { "primary": "#ab2d00", "surface": "#f6f6f6" },
                fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined { vertical-align: middle; }
        .primary-gradient { background: linear-gradient(135deg, #ab2d00 0%, #ff7851 100%); }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        /* Scroll suave para la tabla en móviles */
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-surface text-slate-800 font-body antialiased">

    <aside class="w-full lg:w-64 lg:h-screen lg:fixed left-0 top-0 bg-[#0c0f0f] flex lg:flex-col p-4 lg:p-6 justify-between lg:justify-start z-50">
        <div class="flex items-center gap-3 lg:mb-10">
            <div class="w-8 h-8 lg:w-10 lg:h-10 primary-gradient rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-sm lg:text-base">restaurant_menu</span>
            </div>
            <h1 class="text-lg lg:text-xl font-black text-white tracking-tight uppercase font-headline">Onceydoce</h1>
        </div>
        <nav class="hidden lg:block space-y-2">
            <div class="flex items-center gap-3 px-4 py-3 bg-[#ab2d00] text-white rounded-lg font-bold text-sm">
                <span class="material-symbols-outlined">analytics</span>
                <span>Ventas Consolidadas</span>
            </div>
        </nav>
        <div class="lg:hidden flex items-center">
            <span class="material-symbols-outlined text-white">menu</span>
        </div>
    </aside>

    <main class="lg:ml-64 min-h-screen">
        <div class="p-4 md:p-8 max-w-7xl mx-auto space-y-6 lg:space-y-8">
            
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h2 class="text-2xl md:text-4xl font-extrabold font-headline tracking-tight text-slate-900">Dashboard de Ventas</h2>
                    <p class="text-slate-500 text-sm md:text-base font-medium italic">Sincronizado en tiempo real</p>
                </div>
                <div id="status-badge" class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-bold uppercase tracking-widest">
                    En línea
                </div>
            </header>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <div class="bg-white rounded-2xl p-5 md:p-6 card-shadow border-t-4 border-primary">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Ingresos Brutos</p>
                    <p id="stat-ingresos" class="text-2xl md:text-3xl font-black font-headline text-slate-900">$0</p>
                </div>
                <div class="bg-white rounded-2xl p-5 md:p-6 card-shadow">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Unidades</p>
                    <p id="stat-unidades" class="text-2xl md:text-3xl font-black font-headline text-slate-900">0</p>
                </div>
                <div class="bg-white rounded-2xl p-5 md:p-6 card-shadow">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Margen</p>
                    <p id="stat-margen" class="text-2xl md:text-3xl font-black font-headline text-slate-900">0%</p>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-3 overflow-hidden">
                        <div id="bar-margen" class="bg-primary h-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-5 md:p-6 card-shadow">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Costo Total</p>
                    <p id="stat-costos" class="text-2xl md:text-3xl font-black font-headline text-red-600">$0</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="table-container">
                    <table class="w-full text-left min-w-[600px]">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-6 md:px-8 py-4 text-[10px] font-bold uppercase text-slate-500">Producto</th>
                                <th class="px-4 py-4 text-[10px] font-bold uppercase text-slate-500 text-right">Precio</th>
                                <th class="px-4 py-4 text-[10px] font-bold uppercase text-slate-500 text-center">Cant.</th>
                                <th class="px-6 md:px-8 py-4 text-[10px] font-bold uppercase text-primary text-right font-black tracking-widest">Total</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body" class="divide-y divide-slate-50">
                            <tr>
                                <td colspan="4" class="p-16 text-center text-slate-400 text-sm">Cargando datos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const JSON_URL = 'https://onceydocepos.netlify.app/ventas29.json'; 

        async function fetchData() {
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error('Error en red');
                
                const rawText = await response.text();

                // Limpieza de JSON (Formato flexible para múltiples bloques)
                const cleanJson = "[" + rawText.trim().replace(/\n/g, ",").replace(/\]\s*\[/g, "],[") + "]";
                const nestedData = JSON.parse(cleanJson);
                const allItems = nestedData.flat();

                const consolidado = {};
                let metrics = { ventas: 0, costos: 0, qty: 0 };

                allItems.forEach(item => {
                    if (!item.nombre) return;

                    if (!consolidado[item.nombre]) {
                        consolidado[item.nombre] = { 
                            nombre: item.nombre, 
                            precio: item.precio, 
                            costo: item.costo, 
                            qty: 0, 
                            total: 0 
                        };
                    }
                    consolidado[item.nombre].qty += item.qty;
                    consolidado[item.nombre].total += (item.precio * item.qty);
                    
                    metrics.ventas += (item.precio * item.qty);
                    metrics.costos += (item.costo * item.qty);
                    metrics.qty += item.qty;
                });

                // Update UI
                document.getElementById('stat-ingresos').innerText = `$${metrics.ventas.toLocaleString('es-AR')}`;
                document.getElementById('stat-unidades').innerText = metrics.qty;
                document.getElementById('stat-costos').innerText = `$${metrics.costos.toLocaleString('es-AR')}`;
                
                const margenPorcentaje = metrics.ventas > 0 ? ((metrics.ventas - metrics.costos) / metrics.ventas) * 100 : 0;
                document.getElementById('stat-margen').innerText = `${margenPorcentaje.toFixed(1)}%`;
                document.getElementById('bar-margen').style.width = `${margenPorcentaje}%`;

                // Render Table
                const tbody = document.getElementById('tabla-body');
                tbody.innerHTML = Object.values(consolidado)
                    .sort((a, b) => b.total - a.total)
                    .map(p => `
                        <tr class="hover:bg-orange-50/30 transition-colors">
                            <td class="px-6 md:px-8 py-4">
                                <span class="font-bold text-slate-800 text-sm md:text-base">${p.nombre}</span>
                            </td>
                            <td class="px-4 py-4 text-right text-slate-500 font-medium text-sm">$${p.precio.toLocaleString('es-AR')}</td>
                            <td class="px-4 py-4 text-center">
                                <span class="bg-slate-100 text-slate-700 px-2.5 py-1 rounded-full text-[10px] font-black">${p.qty}</span>
                            </td>
                            <td class="px-6 md:px-8 py-4 text-right font-black text-slate-900 text-base md:text-lg">$${p.total.toLocaleString('es-AR')}</td>
                        </tr>
                    `).join('');

            } catch (error) {
                console.error("Fallo:", error);
                document.getElementById('status-badge').className = "px-3 py-1 bg-red-100 text-red-700 rounded-full text-[10px] font-bold";
                document.getElementById('status-badge').innerText = "Error";
                document.getElementById('tabla-body').innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500 font-bold text-sm">Error al cargar datos.</td></tr>`;
            }
        }

        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
